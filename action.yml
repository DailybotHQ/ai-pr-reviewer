name: 'AI Diff Reviewer'
description: 'Run an LLM-driven code review on every pull request — inline comments, severity-based gating, no infra required.'
author: 'DailybotHQ'

# Marketplace branding. Use anything from the GitHub Octicons set; the colour
# scopes how the listing tile renders. Purple is closest to the "review" hue
# in the GitHub UI.
#
# Marketplace listing title = "AI Diff Reviewer" — slugifies to `ai-diff-reviewer`,
# which now also matches the GitHub repo slug (`DailybotHQ/ai-diff-reviewer`)
# exactly. The v1.4.x publish attempt as "AI PR Reviewer" failed because the
# obvious slug `ai-pr-reviewer` collides with an unrelated squatting
# organization on GitHub (`github.com/ai-pr-reviewer`, 0 public repos since
# 2024-01) — GitHub's global namespace collision rule ("Name must be unique —
# cannot match an existing action, user or organization name") blocks the
# Marketplace publish. Coordinated rename on 2026-07-14: `action.yml` `name:`
# to "AI Diff Reviewer" AND `DailybotHQ/ai-pr-reviewer` renamed to
# `DailybotHQ/ai-diff-reviewer`. GitHub's permanent 301 redirect on renamed
# repos keeps existing `uses: DailybotHQ/ai-pr-reviewer@v1` pins working;
# new copy-paste examples always use the canonical URL. "AI Diff Reviewer"
# is also more accurate: this action reviews the `git diff origin/<base>...HEAD`
# specifically, not the PR envelope (labels/description/metadata). Vendor
# attribution is handled by the `author:` field above — GitHub renders it as
# "by DailybotHQ" beneath the listing title automatically, so we do NOT
# prefix the name with "Dailybot" (community-tool positioning matches the
# MIT + BYOK + zero-backend project reality). See AGENTS.md § "Marketplace
# branding stable" for the full rename decision log.
branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  api-key:
    description: 'API key for the chosen provider (Anthropic for v1).'
    required: true
  github-token:
    description: 'Token used to read the PR diff and post the review. Needs `pull-requests: write` and `contents: read`. Pass either the default `secrets.GITHUB_TOKEN` or a PAT/automation token if you want the review attributed to a specific bot account.'
    required: true

  provider:
    description: 'LLM provider. `anthropic` (default, chat-completions), `claude-code` (Claude Code CLI, agent-runner), `cursor` (Cursor Agent CLI, agent-runner), `codex` (OpenAI Codex CLI, agent-runner).'
    required: false
    default: 'anthropic'
  model:
    description: 'Model id for the chosen provider. Empty = provider default. Defaults balance review quality against cost: Anthropic → `claude-sonnet-4-6`; Claude Code → `claude-sonnet-4-6` (the quality/price sweet spot for code review; never `auto`, which can silently be Opus; pin `claude-haiku-4-5` for a cheaper/shallower smoke review); Cursor → `auto` (unlimited on Pro plans; pin `composer-2.5` etc. to force a specific model); Codex → `gpt-5.6-luna` (current-gen budget model, the OpenAI parallel of the Sonnet-class choice — `gpt-5-codex` is deprecated; pin the cheaper `gpt-5.4-mini` for a shallower smoke review). Note the `api-key` input for Claude Code also accepts a `claude setup-token` subscription OAuth token (`sk-ant-oat…`) to bill against a Claude Pro/Max plan instead of API usage. See docs/PROVIDERS.md § "Choosing a cost-efficient model".'
    required: false
    default: ''

  prompt-file:
    description: 'Path inside the consumer checkout to a markdown system prompt. Empty = use the bundled `prompts/default.md`. FULLY REPLACES the base prompt. Use `prompt-extension-file` if you only want to layer overrides on top. See docs/PROMPTS.md.'
    required: false
    default: ''

  prompt-extension-file:
    description: 'Path inside the consumer checkout to a markdown file whose content is APPENDED to the base prompt (either the bundled default or a custom `prompt-file`). Use this to layer project-specific severity overrides, stack-specific conventions, or repo-specific guidance without copy-pasting the whole default. Both inputs can be set together: `prompt-file` becomes the base, `prompt-extension-file` is appended. See docs/PROMPTS.md.'
    required: false
    default: ''

  author-association:
    description: >-
      Comma-separated whitelist of GitHub `pull_request.author_association`
      values allowed to trigger the review. Defaults to write-tier only
      (`OWNER,MEMBER,COLLABORATOR`) — the safest baseline for public
      open-source repos, since it prevents an external contributor from
      opening PRs to burn the maintainer's provider API budget. Set to
      an empty string to disable the gate (review every PR). Common
      presets: add `CONTRIBUTOR` to include returning contributors;
      remove `COLLABORATOR` to gate on org membership only. Case- and
      whitespace-insensitive. See docs/SECURITY.md § "Author-association
      gate" for the threat model.
    required: false
    default: 'OWNER,MEMBER,COLLABORATOR'
  label-gate:
    description: 'If non-empty, the review only runs when the PR carries this label (e.g. `ready`). Useful to keep work-in-progress noise out of the review queue. Combined with `trigger-mode`.'
    required: false
    default: ''
  trigger-mode:
    description: 'When to run the review. `always` (default when no `label-gate`) — every push/synchronize. `label-required` (implicit when `label-gate` is set) — only when the label is present. `label-once` — only once per label application; toggle the label off/on to re-run. `label-added-only` — only on the `labeled` webhook event (workflow must subscribe with `types: [labeled]`). See docs/TRIGGER_MODES.md.'
    required: false
    default: ''
  applied-label:
    description: 'If non-empty, this label is applied to the PR after a successful, non-blocked review (e.g. `pr-reviewed`). Empty = no label is applied.'
    required: false
    default: ''
  skip-review-label:
    description: 'Optional emergency-bypass label (e.g. `skip-ai-review`). When BOTH the workflow trigger fires AND this label is present on the PR, the reviewer short-circuits: no LLM call, no findings, no state mutation — the GitHub check reports success (exit 0) so the merge can proceed. A tracking comment is posted explaining WHY the review was skipped so the audit trail stays intact. Intended for hotfixes / rollbacks / trivially safe changes where an LLM review would burn tokens for no incremental value. SECURITY: anyone who can label a PR can bypass code review — combine with a CODEOWNERS/ruleset rule that restricts who can apply this label. MISCONFIG GUARD: the reviewer aborts loudly at startup if this label equals `label-gate`, `applied-label`, or `iteration-escape-label` (each collision would silently convert every normal review trigger into a skip). Empty (default) = feature disabled; opt-in.'
    required: false
    default: ''

  collapse-previous:
    description: 'On every new run, mark previous bot reviews/comments as `OUTDATED` via GraphQL `minimizeComment` so only the latest review is visually active.'
    required: false
    default: 'true'
  tracking-comment:
    description: 'Post a tracking/spinner comment that transitions in-place from `Working…` to `View review →` when the review completes. The first line carries a `<!-- ai-pr-reviewer-marker -->` marker so downstream automation can locate it.'
    required: false
    default: 'true'

  strictness:
    description: 'How strictly to gate the GitHub check on the review outcome. `lenient` — always succeed. `block-on-critical` — fail the check if any inline comment is severity `critical`. `block-on-warning` — fail if any inline comment is `critical` or `warning`. `block-on-any` — fail if ANY inline comment was posted, including `info` (zero-tolerance mode for security-critical or regulated stacks). The model decides the severity per comment via the `severity` tool argument; the bundled default prompt explains the levels.'
    required: false
    default: 'lenient'

  max-inline-comments:
    description: 'Hard cap on the number of inline comments the reviewer can queue per run. The model is instructed to stay well under this; the cap is the safety net.'
    required: false
    default: '10'

  # ---------------- PR metadata checks (v1.2.0+) ----------------
  pr-description-mode:
    description: 'Behavior when the PR body is missing or too vague. `off` (default) — no check. `warn` — flag in the review summary; the strictness gate is unchanged. `block` — force the check to fail regardless of severity. `autocomplete` — the reviewer AI writes a first-draft body via a PATCH to the PR (guarded by a marker so it never overwrites maintainer edits). See docs/PR_METADATA_CHECKS.md.'
    required: false
    default: 'off'
  pr-description-min-length:
    description: 'Character threshold below which the PR body is treated as "missing/vague". Applies to `warn`, `block`, and `autocomplete` modes. Default `50`.'
    required: false
    default: '50'
  complexity-labels-enabled:
    description: 'When `true`, the reviewer assesses PR complexity (`low`/`medium`/`high`) based on the full change and applies a `<prefix><level>` label. Uses AI signals (cognitive load, files touched, security surface, coverage delta) rather than line count. See docs/PR_METADATA_CHECKS.md.'
    required: false
    default: 'false'
  complexity-label-prefix:
    description: 'Prefix for the applied complexity label. Default `complexity:` produces `complexity:low` / `complexity:medium` / `complexity:high`. Any prior label matching the prefix is removed before the current one is applied.'
    required: false
    default: 'complexity:'

  max-turns:
    description: 'Hard cap on the agentic loop iterations. Each turn = one Anthropic API call + a batch of tool calls. Only used by chat-completions providers; agent-runner providers use `agent-max-turns` instead.'
    required: false
    default: '30'

  # ---------------- Agent-runner (CLI) provider parameterisation ----------------
  # These inputs only affect the CLI providers (`claude-code`, `cursor`, `codex`).
  # Ignored by `anthropic`. Empty = provider default.
  agent-max-turns:
    description: 'Reserved budget hint for CLI providers. Currently logs a warning instead of enforcing a cap because the shipping CLIs do not expose one stable cross-provider turn-count flag. Ignored for chat-completions providers.'
    required: false
    default: ''
  agent-extra-args:
    description: 'Raw string appended to the CLI invocation. Parsed with `shlex.split` on the Python side (never `shell=True`). Escape hatch for provider-specific flags not exposed by other inputs.'
    required: false
    default: ''
  mcp-config-file:
    description: 'Path (relative to the consumer''s checkout) to an MCP servers JSON config. If set, the file is copied to the CLI''s expected location (`~/.claude/mcp.json`, `~/.cursor/mcp.json`, `~/.codex/mcp.json`) before invocation and cleaned up after.'
    required: false
    default: ''
  claude-code-version:
    description: 'Pin the Claude Code CLI version (npm semver). Empty = latest.'
    required: false
    default: ''
  cursor-version:
    description: 'Pin the Cursor Agent CLI version. Empty = latest stable.'
    required: false
    default: ''
  codex-version:
    description: 'Pin the OpenAI Codex CLI version (npm semver). Empty = latest.'
    required: false
    default: ''

  # ---------------- Iteration-Aware Review (IAR) — tunable knobs ----------------
  # IAR runs on every review. The four inputs below shape the pipeline.
  # See docs/ITERATION_AWARENESS.md.
  convergence-policy:
    description: 'Which IAR convergence policy to apply. Defaults to `first-pass-exhaustive`: exhaustive prompt + higher cap on round 1 of each generation, dedup on rounds 2+ — solves the "10 loops of trickled warnings" pain. Alternatives: `iterative` (dedup only, no cap boost; cost-neutral; recommended for push-heavy workflows), `round-capped` (dedup pre-cap, only critical severity surfaces post-cap; requires `max-review-rounds > 0`), `critical-gate` (strict cross-generation dedup — prior-resolved fingerprints stay silenced unless critical). Critical severity findings ALWAYS surface unconditionally under every policy — hardcoded safety rail.'
    required: false
    default: 'first-pass-exhaustive'
  max-review-rounds:
    description: 'Hard cap for the `round-capped` convergence policy. `0` (default) = unlimited (behaves like `iterative` for that policy). After N rounds, only critical severity findings surface — warnings and infos are silenced with a "cap reached" annotation. Ignored by other policies.'
    required: false
    default: '0'
  exhaustive-first-pass-cap-multiplier:
    description: 'Multiplier applied to `max-inline-comments` on round 1 of each generation when `convergence-policy` is `first-pass-exhaustive`. Default `3` means round 1 can post up to 3× the normal cap; rounds 2+ use the base cap. Set to `1` to disable the amplification while keeping the exhaustive prompt splicing. Ignored by other policies. See docs/ITERATION_AWARENESS.md § 6.2.'
    required: false
    default: '3'
  iteration-escape-label:
    description: 'Label name a human can apply to a PR to force a full review regardless of IAR state — dedup is skipped for that run only, persisted state is NOT mutated. Default `full-review-please`. When the label is removed, subsequent reviews resume normal IAR behavior. See docs/ITERATION_AWARENESS.md § 8.'
    required: false
    default: 'full-review-please'

outputs:
  review-url:
    description: 'URL of the posted PR review (empty when the run was skipped).'
    value: ${{ steps.review.outputs.review-url }}
  severity:
    description: 'Highest severity flagged in this review: `none`, `info`, `warning`, or `critical`.'
    value: ${{ steps.review.outputs.severity }}
  inline-attached:
    description: 'Number of inline comments actually attached to the review.'
    value: ${{ steps.review.outputs.inline-attached }}
  inline-dropped:
    description: 'Number of inline comments dropped because GitHub rejected the review with HTTP 422 (the action retries summary-only on 422).'
    value: ${{ steps.review.outputs.inline-dropped }}
  blocked:
    description: 'Whether the strictness gate decided to fail the check (`true`/`false`). When `true`, the action exits with code 2 so the GitHub check turns red.'
    value: ${{ steps.review.outputs.blocked }}
  skipped:
    description: 'Whether the run was skipped without invoking the LLM (`true`/`false`). Set to `true` when EITHER (a) the label gate suppressed the run (missing `label-gate` label, `author-association` filter, `trigger-mode: label-once` already reviewed this label toggle, etc.) OR (b) the configured `skip-review-label` was present on the PR at trigger time (the emergency-bypass short-circuit).'
    value: ${{ steps.review.outputs.skipped }}

  # ---------------- Iteration-Aware Review (IAR) outputs ----------------
  # Populated on every run. If the IAR pipeline crashes mid-flight
  # (caught by main()'s try/except), all five outputs stay as empty
  # strings so downstream steps reading them always see a defined value.
  iteration-round:
    description: 'IAR round number within the current generation (`1` on first review, resets when a new generation begins). Empty string if the IAR pipeline crashed before populating outputs.'
    value: ${{ steps.review.outputs.iteration-round }}
  iteration-generation:
    description: 'IAR generation counter. Increments when new commits or a rebase are detected via the range hash. Empty string if the IAR pipeline crashed before populating outputs.'
    value: ${{ steps.review.outputs.iteration-generation }}
  iteration-policy-applied:
    description: 'Which IAR policy actually fired this run. Usually matches `convergence-policy`, but the 30% new-lines safety net overrides it to `safety-net-forced-first-pass-exhaustive`, and the escape label overrides to `escape-label-forced-full-review`. Grep marker chains for `policy=\`safety-net-forced-` / `policy=\`escape-label-forced-` to audit either override. Empty string if the IAR pipeline crashed before populating outputs.'
    value: ${{ steps.review.outputs.iteration-policy-applied }}
  iteration-tokens-used:
    description: 'Total input + output tokens consumed by the LLM in this run (cost telemetry). Empty string if the IAR pipeline crashed before populating outputs.'
    value: ${{ steps.review.outputs.iteration-tokens-used }}
  iteration-cost-vs-baseline-estimate:
    description: 'Coarse heuristic estimate of this run''s LLM-call cost vs a projected no-dedup baseline, derived from cap expansion (`effective_cap / base_cap`) plus a small addendum-overhead flag. Always non-negative: `"0%"` when no cap expansion fires, `"+N%"` when round 1 of first-pass-exhaustive or the safety net raises the cap. Silenced-finding savings are not yet modelled (see docs/ITERATION_AWARENESS.md § 9.5). Empty string if the IAR pipeline crashed before populating outputs.'
    value: ${{ steps.review.outputs.iteration-cost-vs-baseline-estimate }}

runs:
  using: 'composite'
  steps:
    # ---------------------------------------------------------------
    # Modular CLI install — only one of these steps runs per invocation,
    # gated by `if: inputs.provider == '...'`. Consumers of the default
    # `provider: anthropic` pay zero install overhead.
    # ---------------------------------------------------------------
    - name: Set up Node.js (Claude Code)
      if: inputs.provider == 'claude-code'
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    - name: Install Claude Code CLI
      if: inputs.provider == 'claude-code'
      shell: bash
      env:
        CLAUDE_CODE_VERSION: ${{ inputs.claude-code-version }}
      run: |
        set -euo pipefail
        # Pin if the user provided a version; otherwise resolve `latest`.
        pkg="@anthropic-ai/claude-code"
        if [ -n "${CLAUDE_CODE_VERSION}" ]; then
          pkg="${pkg}@${CLAUDE_CODE_VERSION}"
        fi
        echo "::group::npm install -g ${pkg}"
        npm install -g "${pkg}"
        echo "::endgroup::"
        claude --version

    - name: Set up Node.js (Codex)
      if: inputs.provider == 'codex'
      uses: actions/setup-node@v6
      with:
        node-version: '20'
    - name: Install OpenAI Codex CLI
      if: inputs.provider == 'codex'
      shell: bash
      env:
        CODEX_VERSION: ${{ inputs.codex-version }}
      run: |
        set -euo pipefail
        pkg="@openai/codex"
        if [ -n "${CODEX_VERSION}" ]; then
          pkg="${pkg}@${CODEX_VERSION}"
        fi
        echo "::group::npm install -g ${pkg}"
        npm install -g "${pkg}"
        echo "::endgroup::"
        codex --version

    - name: Install Cursor Agent CLI
      if: inputs.provider == 'cursor'
      shell: bash
      env:
        CURSOR_VERSION: ${{ inputs.cursor-version }}
      run: |
        set -euo pipefail
        # Cursor's official installer script places the binary in
        # ~/.local/bin. We forward VERSION when the consumer pins it.
        installer_url="https://cursor.com/install"
        if [ -n "${CURSOR_VERSION}" ]; then
          # Cursor's installer respects a VERSION env var for pinning.
          echo "::group::Install cursor-agent (pinned to ${CURSOR_VERSION})"
          VERSION="${CURSOR_VERSION}" curl -fsSL "${installer_url}" | bash
        else
          echo "::group::Install cursor-agent (latest)"
          curl -fsSL "${installer_url}" | bash
        fi
        echo "::endgroup::"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/cursor-agent" --version

    # ---------------------------------------------------------------
    # Main review runtime — invoked for every provider (chat-completions
    # OR agent-runner). scripts/reviewer.py dispatches on AIPRR_PROVIDER.
    # ---------------------------------------------------------------
    - name: Run AI Diff Reviewer
      id: review
      shell: bash
      env:
        # All inputs are forwarded with an `AIPRR_` prefix so the Python script
        # has a stable, non-clashing namespace regardless of which provider
        # we add next. Direct `INPUT_*` variables are NOT used — composite
        # actions only set those for the action's own runtime, not for
        # arbitrary `run:` blocks.
        AIPRR_PROVIDER: ${{ inputs.provider }}
        AIPRR_API_KEY: ${{ inputs.api-key }}
        AIPRR_GH_TOKEN: ${{ inputs.github-token }}
        AIPRR_MODEL: ${{ inputs.model }}
        AIPRR_PROMPT_FILE: ${{ inputs.prompt-file }}
        AIPRR_PROMPT_EXTENSION_FILE: ${{ inputs.prompt-extension-file }}
        AIPRR_AUTHOR_ASSOCIATION: ${{ inputs.author-association }}
        AIPRR_LABEL_GATE: ${{ inputs.label-gate }}
        AIPRR_TRIGGER_MODE: ${{ inputs.trigger-mode }}
        AIPRR_APPLIED_LABEL: ${{ inputs.applied-label }}
        AIPRR_SKIP_REVIEW_LABEL: ${{ inputs.skip-review-label }}
        AIPRR_COLLAPSE_PREVIOUS: ${{ inputs.collapse-previous }}
        AIPRR_TRACKING_COMMENT: ${{ inputs.tracking-comment }}
        AIPRR_STRICTNESS: ${{ inputs.strictness }}
        AIPRR_MAX_INLINE_COMMENTS: ${{ inputs.max-inline-comments }}
        AIPRR_MAX_TURNS: ${{ inputs.max-turns }}

        AIPRR_PR_DESCRIPTION_MODE: ${{ inputs.pr-description-mode }}
        AIPRR_PR_DESCRIPTION_MIN_LENGTH: ${{ inputs.pr-description-min-length }}
        AIPRR_COMPLEXITY_LABELS_ENABLED: ${{ inputs.complexity-labels-enabled }}
        AIPRR_COMPLEXITY_LABEL_PREFIX: ${{ inputs.complexity-label-prefix }}

        # Agent-runner (CLI) provider parameterisation. Consumed only by the
        # `claude-code`, `cursor`, and `codex` provider branches.
        AIPRR_AGENT_MAX_TURNS: ${{ inputs.agent-max-turns }}
        AIPRR_AGENT_EXTRA_ARGS: ${{ inputs.agent-extra-args }}
        AIPRR_MCP_CONFIG_FILE: ${{ inputs.mcp-config-file }}
        AIPRR_CLAUDE_CODE_VERSION: ${{ inputs.claude-code-version }}
        AIPRR_CURSOR_VERSION: ${{ inputs.cursor-version }}
        AIPRR_CODEX_VERSION: ${{ inputs.codex-version }}

        # Iteration-Aware Review (IAR). The four env vars below shape
        # the pipeline. See docs/ITERATION_AWARENESS.md.
        AIPRR_CONVERGENCE_POLICY: ${{ inputs.convergence-policy }}
        AIPRR_MAX_REVIEW_ROUNDS: ${{ inputs.max-review-rounds }}
        AIPRR_EXHAUSTIVE_FIRST_PASS_CAP_MULTIPLIER: ${{ inputs.exhaustive-first-pass-cap-multiplier }}
        AIPRR_ITERATION_ESCAPE_LABEL: ${{ inputs.iteration-escape-label }}

        # Repo / PR context — pulled from the consumer's `pull_request` event.
        AIPRR_REPO: ${{ github.repository }}
        AIPRR_PR_NUMBER: ${{ github.event.pull_request.number }}
        AIPRR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        AIPRR_BASE_REF: ${{ github.event.pull_request.base.ref }}

        # `github.action_path` is the absolute path to *this action's* checkout
        # on the runner, which is what we need to locate `scripts/reviewer.py`
        # and `prompts/default.md` regardless of the consumer's workspace.
        AIPRR_ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        python3 "${AIPRR_ACTION_PATH}/scripts/reviewer.py"

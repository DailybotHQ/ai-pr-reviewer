name: Release

# Auto-update the moving major-version tag (e.g. `v2`) when a new
# `vX.Y.Z` release is published. Consumers pinning `@v2` then pick up
# patches and minor features automatically; consumers pinning `@v2.0.0`
# stay frozen. Standard pattern for Marketplace-published actions.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-major-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute and push major-version tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '$RELEASE_TAG' is not a SemVer (vX.Y.Z) tag — skipping."
            exit 0
          fi
          MAJOR="${RELEASE_TAG%%.*}"     # e.g. v1 from v1.2.3
          echo "Pointing $MAJOR at $RELEASE_TAG"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-update the major tag locally and push it. `--force` is
          # safe here: the major tag is a *moving* alias by design.
          git tag -f "$MAJOR" "$RELEASE_TAG"
          git push origin "$MAJOR" --force

name: Code Check

# Gate every PR to `main` (and every push to `main`) on the same checks a
# contributor would run locally: the runtime compiles on the supported floor
# (Python 3.10), the action.yml public contract is intact, the workflows lint
# clean, and the unit-test suite passes. Mirrors the DailyBot `code_check`
# convention used across our other open-source repos, adapted for a
# stdlib-only Python composite action (no npm install / build step).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: 'Validate — compile + contract + lint'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Step 0 - 🐍 Set up Python ${{ '3.10' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Step 1 - 🧪 Compile the runtime (stdlib-only, py3.10 floor)
        run: python3 -m py_compile scripts/reviewer.py

      - name: Step 2 - 📦 Install lint tooling
        # CI-only tooling — the runtime stays stdlib-only (AGENTS.md Rule #2).
        run: python3 -m pip install --quiet pyyaml

      - name: Step 3 - 📄 Validate the action.yml public contract
        run: python3 .github/scripts/validate_action.py

      - name: Step 4 - 🔎 Lint GitHub workflows (actionlint)
        # Pin both the bootstrap script (tag) and the binary version so the
        # check is reproducible and not at the mercy of the latest release.
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash) 1.7.7
          ./actionlint -color

  tests:
    name: 'Run tests'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Step 0 - 🐍 Set up Python ${{ '3.10' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Step 1 - 🧪 Run the unit-test suite (stdlib unittest)
        run: python3 -m unittest discover -s tests -v

  cli-install-smoke:
    name: 'CLI install smoke — ${{ matrix.provider }}'
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [claude-code, cursor, codex]
    steps:
      - uses: actions/checkout@v4

      # Verify each provider's install steps from action.yml succeed on a
      # fresh runner. The install script must:
      #   1. Place the CLI binary on PATH.
      #   2. Report a version.
      # We don't invoke the CLI with a real API key — the goal is to catch
      # a broken installer script (404 URLs, npm package renames, dropped
      # dependencies) BEFORE it reaches consumers on `main`.
      - name: Set up Node.js (Claude Code + Codex)
        if: matrix.provider == 'claude-code' || matrix.provider == 'codex'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        if: matrix.provider == 'claude-code'
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::npm install -g @anthropic-ai/claude-code"
          npm install -g "@anthropic-ai/claude-code"
          echo "::endgroup::"
          claude --version

      - name: Install OpenAI Codex CLI
        if: matrix.provider == 'codex'
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::npm install -g @openai/codex"
          npm install -g "@openai/codex"
          echo "::endgroup::"
          codex --version

      - name: Install Cursor Agent CLI
        if: matrix.provider == 'cursor'
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Install cursor-agent"
          curl -fsSL https://cursor.com/install | bash
          echo "::endgroup::"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/cursor-agent" --version

      - name: Sanity — reviewer.py imports the provider class
        shell: bash
        env:
          PROVIDER_ID: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          # Simulate provider dispatch via build_provider() to catch bit-rot
          # between action.yml (installer wiring) and reviewer.py (dispatch).
          #
          # Import via sys.path (not spec_from_file_location) because Python
          # 3.12's @dataclass helper walks sys.modules[cls.__module__].__dict__
          # during class construction — spec_from_file_location skips that
          # registration and blows up on the first dataclass at module scope.
          python3 -c "
          import os, sys
          sys.path.insert(0, 'scripts')
          import reviewer as r
          p = r.build_provider(os.environ['PROVIDER_ID'], api_key='k', model='')
          assert isinstance(p, r.AgentRunnerProvider), 'wrong class'
          print(f'OK: {type(p).__name__} constructed and CLI on PATH')
          "

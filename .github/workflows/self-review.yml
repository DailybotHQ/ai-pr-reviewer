name: Self-review

# Dogfood: review every PR to this action's own `main` with the action
# itself, across all four shipping providers in parallel. The local checkout
# under `./` is what gets used (instead of a `uses: DailybotHQ/ai-pr-reviewer@v1`
# pin) so the in-flight changes are what reviews the in-flight changes.
#
# One matrix leg per provider — each leg posts its own review with a
# provider-scoped `applied-label` so we can tell the reviews apart in the
# PR conversation tab.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: self-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  self-review:
    name: 'Self-review — ${{ matrix.provider }}'
    runs-on: ubuntu-latest
    # Higher timeout because agent-runner providers can take longer than
    # the chat-completions Anthropic path.
    timeout-minutes: 25
    strategy:
      # Continue reviewing across providers even if one fails — the goal
      # is comparative dogfooding, not gating merge on all four.
      fail-fast: false
      matrix:
        include:
          - provider: anthropic
            api-key-secret: ANTHROPIC_API_KEY
            applied-label: 'self-reviewed:anthropic'
          - provider: claude-code
            api-key-secret: ANTHROPIC_API_KEY
            applied-label: 'self-reviewed:claude-code'
          - provider: cursor
            api-key-secret: CURSOR_API_KEY
            applied-label: 'self-reviewed:cursor'
          - provider: codex
            api-key-secret: OPENAI_API_KEY
            applied-label: 'self-reviewed:codex'
    steps:
      - name: Skip when provider secret is unset
        id: gate
        shell: bash
        env:
          API_KEY: ${{ secrets[matrix.api-key-secret] }}
          PROVIDER: ${{ matrix.provider }}
          SECRET_NAME: ${{ matrix.api-key-secret }}
        run: |
          if [[ -z "${API_KEY}" ]]; then
            echo "::notice::${SECRET_NAME} is not configured for this repo; skipping the ${PROVIDER} leg."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'
        with:
          fetch-depth: 0

      - name: Run AI PR Reviewer (local checkout, provider=${{ matrix.provider }})
        if: steps.gate.outputs.skip != 'true'
        # `./` resolves to this repo's checkout — i.e. we use the version
        # of the action that this PR is proposing, not the published one.
        # This is the canonical "test in CI" setup for action repos.
        uses: ./
        with:
          provider: ${{ matrix.provider }}
          api-key: ${{ secrets[matrix.api-key-secret] }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          strictness: lenient
          applied-label: ${{ matrix.applied-label }}
          # The action's own prompt is the bundled default — no override
          # needed; that's the prompt we ship to users, so dogfooding it
          # is the right thing.

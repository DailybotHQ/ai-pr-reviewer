name: Self-review

# Dogfood: review PRs to this action's own `main` with the action itself.
#
# Design goals:
#   1. LABEL-GATED, RUN-ONCE — the dogfood runs only when the `ready` label is
#      applied (case-insensitive: `ready`/`Ready`/`READY`), exactly once per
#      application. It fires on the `labeled` event (and on `opened` if the PR
#      already carries `ready`), NOT on every push — so to re-review you remove
#      and re-add the `ready` label. This keeps the maintainer in explicit
#      control of when tokens burn.
#   2. FULL COVERAGE — every configured provider (Anthropic + the three CLI
#      providers: claude-code, cursor, codex) reviews EVERY ready-labeled PR,
#      including docs-only and AI-tooling-only diffs. Rationale is trust
#      surface: skill vendors under `.agents/`, workflow tweaks under
#      `.github/`, prompt edits under `prompts/`, and doc changes are exactly
#      the paths where prompt injection or malicious content can hide, so
#      they deserve a review even when no runtime code changed. A leg is
#      absent from the matrix only when its secret is not configured on the
#      repo — never based on the diff shape.
#   3. HONEST STATUS — the single `scope` job builds the matrix of provider legs
#      that will ACTUALLY review this event. A leg that shouldn't run (no
#      `ready` label, or an unset provider secret) is simply absent from the
#      matrix, so it never shows a misleading green Success; when nothing is
#      eligible the whole review job reports as **Skipped** (grey). A green
#      leg means it actually reviewed.
#   4. MERGE GATE (OPT-IN) — a final `gate` job with a STABLE name
#      (`Self-review gate`) is the one check you mark as *Required* in branch
#      protection under an opt-in review flow. It ONLY runs when THIS event
#      was a review-request event (i.e. `scope` decided a review should run,
#      detected via `empty_reason != 'no-ready-label'`), and when it runs it
#      FAILS (red → blocks merge) unless AT LEAST ONE provider leg ran and
#      passed — a scope error, no eligible provider, or every leg failing all
#      block; a single failing provider does NOT block if another passed.
#      When the event isn't a review-request (no `ready` label, or an
#      unrelated `labeled` event on a PR that happens to carry `ready`) the
#      whole gate is **Skipped** (grey) so a docs/other PR that doesn't want
#      a review carries no red-X noise in the checks list.
#
#      Trade-off: GitHub treats a *skipped* required check as *passing* for
#      branch protection, so under this opt-in design a PR without `ready`
#      becomes mergeable without a self-review. If you want "every PR must be
#      reviewed", pair this required check with a separate rule that enforces
#      the `ready` label (a lightweight labeler action or a repository ruleset)
#      — the gate itself is deliberately scoped to "review was requested".
#
#      Mark ONLY `Self-review gate` required — never the dynamic
#      `Self-review — <provider>` leg names (they vary and disappear when
#      skipped).
#
# Why a `scope` job + dynamic matrix instead of a per-leg `if:`? GitHub Actions
# does not expose the `matrix` context to a job-level `if:`, so a static matrix
# can only be skipped at the STEP level — which leaves the job green. Building
# the matrix from a decision job is the supported way to make ineligible legs
# skip cleanly. Consumers who want the same pattern: see docs/TRIGGER_MODES.md
# § "Recipe: run once when labelled `ready`, block merge until it passes".
#
# The local checkout under `./` is what gets used (instead of a
# `uses: DailybotHQ/ai-diff-reviewer@v2` pin), so the in-flight changes are what
# review the in-flight changes.

on:
  pull_request:
    branches: [main]
    # `labeled` (re-)adding `ready` re-triggers; `opened` catches a PR created
    # with `ready` already on it. Deliberately NOT `synchronize` — pushes do
    # not re-review (run-once semantics; toggle the label to re-run).
    types: [opened, labeled]

concurrency:
  group: self-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Single cheap decision job. Emits the matrix of provider legs that should
  # ACTUALLY review this event (as JSON). Everything the review legs gate on
  # lives here, so an ineligible leg is never created — no green no-ops.
  # ---------------------------------------------------------------------------
  scope:
    name: 'Decide self-review scope'
    runs-on: ubuntu-latest
    outputs:
      # A JSON array of matrix `include` entries — `[]` when nothing runs.
      matrix: ${{ steps.decide.outputs.matrix }}
      # Why the matrix is empty, surfaced in the scope job's log for humans and
      # consumed by the gate when it runs (`ready` applied path only). Values:
      # `no-ready-label` (the gate is skipped, no error), `no-provider-secret`
      # (gate fails — `ready` is applied but no provider secret is configured
      # on the repo, so nothing can review). Empty when the matrix is
      # non-empty.
      empty_reason: ${{ steps.decide.outputs.empty_reason }}
    steps:
      # No checkout: the decision only reads event context and secret presence,
      # never the diff (full coverage = every provider on every ready PR).
      - name: Decide which provider legs run
        id: decide
        shell: bash
        env:
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_LABEL: ${{ github.event.label.name }}
          LABELS_JSON: ${{ toJSON(github.event.pull_request.labels.*.name) }}
          # Whether each provider's secret is configured. `!= ''` yields the
          # string "true"/"false" — the secret VALUE never enters the shell.
          HAS_ANTHROPIC: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_CLAUDE_CODE: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
          HAS_CURSOR: ${{ secrets.CURSOR_API_KEY != '' }}
          HAS_OPENAI: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          set -euo pipefail
          lc() { tr '[:upper:]' '[:lower:]'; }

          # 1. RUN-ONCE LABEL GATE (case-insensitive).
          #    - `labeled` event: run only when the label just added is `ready`
          #      (ignore unrelated labels like `bug`/`dependencies`).
          #    - `opened` event: run if the PR already carries `ready`.
          ready_present=false
          if printf '%s' "$LABELS_JSON" | lc | grep -qE '"ready"'; then
            ready_present=true
          fi
          should_run=false
          case "$EVENT_ACTION" in
            labeled)
              [ "$(printf '%s' "$EVENT_LABEL" | lc)" = "ready" ] && should_run=true ;;
            opened)
              [ "$ready_present" = "true" ] && should_run=true ;;
          esac
          if [ "$should_run" != "true" ]; then
            echo "::notice::Self-review skipped — apply the 'ready' label to run the dogfood (remove + re-add to re-run)."
            {
              echo 'matrix=[]'
              echo 'empty_reason=no-ready-label'
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Build the matrix. Every configured provider reviews EVERY
          #    ready-labeled PR — no critical-surface filtering — because the
          #    non-runtime paths (`.agents/**` vendored skills, workflows,
          #    prompts, docs) are exactly where prompt injection or malicious
          #    content can hide, and deserve the same scrutiny as runtime
          #    code. A leg is omitted only when its provider secret isn't
          #    configured on the repo — omitted legs show as absent/Skipped,
          #    never a green no-op. Each entry pins an explicit cost-efficient
          #    model — never `auto` for metered providers; Cursor uses `auto`
          #    deliberately (flat-rate on Pro).
          matrix='[]'
          add() {
            matrix=$(printf '%s' "$matrix" | jq -c \
              --arg p "$1" --arg s "$2" --arg l "$3" --arg m "$4" \
              '. += [{provider:$p, secret:$s, label:$l, model:$m}]')
          }
          [ "$HAS_ANTHROPIC" = "true" ]   && add anthropic ANTHROPIC_API_KEY "self-reviewed:anthropic" claude-haiku-4-5
          # Claude Code dogfoods the SUBSCRIPTION auth path: CLAUDE_CODE_OAUTH_TOKEN
          # holds a `claude setup-token` OAuth token (`sk-ant-oat…`) which the
          # action auto-detects and bills against a Claude Pro/Max plan.
          [ "$HAS_CLAUDE_CODE" = "true" ] && add claude-code CLAUDE_CODE_OAUTH_TOKEN "self-reviewed:claude-code" claude-haiku-4-5
          [ "$HAS_CURSOR" = "true" ]      && add cursor CURSOR_API_KEY "self-reviewed:cursor" auto
          [ "$HAS_OPENAI" = "true" ]      && add codex OPENAI_API_KEY "self-reviewed:codex" gpt-5.4-mini

          # Record WHY the matrix ended up empty (if it did) so the merge gate can
          # print an accurate hint. Reaching here means `ready` is applied, so an
          # empty matrix means "no provider secret is configured on this repo".
          if [ "$matrix" = "[]" ]; then
            echo "::error::No provider secret configured. Set at least one of ANTHROPIC_API_KEY, CLAUDE_CODE_OAUTH_TOKEN, CURSOR_API_KEY, or OPENAI_API_KEY as a repo secret so the self-review gate can run."
            echo 'empty_reason=no-provider-secret' >> "$GITHUB_OUTPUT"
          else
            echo 'empty_reason=' >> "$GITHUB_OUTPUT"
          fi
          echo "::notice::Self-review matrix: $matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # One matrix leg per ELIGIBLE provider (built by `scope`). The job-level
  # `if:` (which may reference `needs`, unlike `matrix`) skips the whole job as
  # **Skipped** — not green — when no provider is eligible. When a leg does run,
  # it always reviews; there is no internal "run and quietly skip" path left.
  # ---------------------------------------------------------------------------
  self-review:
    name: 'Self-review — ${{ matrix.provider }}'
    needs: scope
    if: needs.scope.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    # Higher timeout because agent-runner providers can take longer than the
    # chat-completions Anthropic path.
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.scope.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Don't persist GITHUB_TOKEN into .git/config: the CLI legs run with
          # broad local access (Claude Code with `bypassPermissions`, and a
          # subscription OAuth token in its env), so a persisted token on disk
          # is exactly the residual exfiltration surface documented in
          # docs/SECURITY.md § "Agent-runner providers". The reviewer talks to
          # the GitHub API in-process; the CLI never needs git credentials.
          persist-credentials: false

      - name: Run AI Diff Reviewer (local checkout, provider=${{ matrix.provider }})
        # `./` resolves to this repo's checkout — i.e. we use the version of the
        # action this PR proposes, not the published one. Canonical CI setup.
        uses: ./
        with:
          provider: ${{ matrix.provider }}
          api-key: ${{ secrets[matrix.secret] }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Defense-in-depth: the `scope` job already gated on the `ready`
          # label, but pass it through so the action's own gate agrees.
          label-gate: ready
          model: ${{ matrix.model }}
          # `block-on-critical` — the check fails only on `critical` findings
          # (security, data loss, breaking API), while `warning`/`info` still
          # post inline but don't gate the merge. This is the calibrated
          # default recommended in docs/STRICTNESS.md once the prompt has
          # been observed for a couple of weeks (we've been on `lenient` for
          # months and the false-positive rate on `critical` is near zero).
          strictness: block-on-critical
          applied-label: ${{ matrix.label }}
          # Layer THIS repo's own review overrides on top of the shipped
          # default prompt so self-review sees the repo-specific rules
          # (stdlib-only, no `shell=True`, marker preservation, symlink
          # hygiene, etc.). Same file the local `ai-diff-reviewer` skill
          # auto-detects — one source of truth for local + CI.
          prompt-extension-file: .review/extension.md
          # Smoke review — keep the chat-completions turn ceiling tight.
          max-turns: 12
          # `collapse-previous` stays at its default `true`; collapsing is
          # provider-scoped (per-provider marker), so the legs coexist and each
          # keeps a single live review. See docs/PROVIDERS.md § "Running more
          # than one provider on the same PR".
          #
          # Iteration-Aware Review — dogfood (Rule #10 pillar A).
          # Every value below matches the shipped default and could be
          # omitted entirely — kept explicit as living documentation of
          # the profile self-review exercises. Every self-review job
          # exercises the full pre-LLM + post-LLM IAR path in production;
          # the failure-fallback safety contract is locked separately by
          # tests/test_iar_failure_fallback.py.
          #
          # NOTE on `max-review-rounds`: kept at the shipped default (0 =
          # unlimited) because under `convergence-policy: first-pass-exhaustive`
          # (the shipped default this workflow dogfoods) the runtime does NOT
          # invoke `apply_round_capped_policy`, so `max-review-rounds` is a
          # no-op here. If a future revision of this workflow adds a matrix
          # leg pinned to `convergence-policy: round-capped`, THAT leg is
          # where `max-review-rounds: 5` becomes meaningful.
          #
          # Manual USER_FORCED_RESET smoke test (docs/ITERATION_AWARENESS.md § 8.5):
          # this workflow also dogfoods the reset gesture. To verify it
          # end-to-end on any PR that has ALREADY been self-reviewed at
          # least ONCE SUCCESSFULLY (i.e. the previous run's strictness
          # gate did not block, so the reviewer actually stamped the
          # `self-reviewed:<provider>` label AND the outgoing IAR state
          # recorded `reviewed_label_applied=True`):
          #   1. Remove the provider's `self-reviewed:<provider>` label
          #      (the `applied-label` value below, per matrix leg — e.g.
          #      `self-reviewed:anthropic`). Removing this label does
          #      NOT trigger the workflow on its own; it just changes
          #      the PR's label state.
          #   2. Remove the `ready` label. Same — no workflow trigger.
          #   3. Re-add `ready`. The workflow fires (`types: [labeled]`);
          #      IAR checks all FIVE USER_FORCED_RESET conditions:
          #        (a) `applied-label` configured (yes: `self-reviewed:*`),
          #        (b) `prior_state is not None` (yes: marker chain has
          #            state from the earlier successful run),
          #        (c) `prior_state.reviewed_label_applied == True` (yes:
          #            recorded by the earlier successful run's marker).
          #        (d) `label_fetch_ok == True` (round-14 F1: the
          #            `_fetch_pr_labels` REST call actually succeeded;
          #            a transient GH 5xx returning an empty list
          #            MUST NOT be misread as "label absent" — that
          #            path silently wipes fingerprint memory).
          #        (e) `applied-label` absent from the returned PR-labels
          #            list (yes: step 1 removed it).
          #      All five true → transition = USER_FORCED_RESET, prior
          #      state discarded, round 1 exhaustive on a clean slate.
          # Verification signals to look for on the completed review comment:
          #   - Marker annotation reads `(user_forced_reset)` (not `(new_commits)`).
          #   - `iteration-generation` output = 1; `iteration-round` output = 1.
          #   - No prior findings are silenced as dedup — the dedup memory is gone.
          # NO-OP CASES (the reset silently does not fire — this is by design):
          #   - If the previous run was blocked (critical finding under
          #     `block-on-critical`), condition (c) fails because the
          #     reviewer didn't stamp the label, so `reviewed_label_applied`
          #     stayed `False`. The re-trigger looks like a normal
          #     `(new_commits)` / `(same_generation)` run, not a reset.
          #   - If no prior IAR state exists (first-ever review of the PR),
          #     condition (b) fails.
          #   - If the `_fetch_pr_labels` REST call fails (transient
          #     GitHub 5xx or rate-limit) condition (d) fails and the
          #     reset is deferred to the next successful fetch.
          #     Prior state is preserved intact so dedup memory is not
          #     wiped on outages.
          # Scope: each provider maintains its own marker + IAR state, so
          # the reset is scoped to whichever `self-reviewed:*` label you
          # removed. Removing all four resets every provider's timeline
          # independently.
          convergence-policy: first-pass-exhaustive        # shipped default
          exhaustive-first-pass-cap-multiplier: 3          # shipped default
          max-review-rounds: 0                             # shipped default (unlimited); no-op under first-pass-exhaustive — see note above
          iteration-escape-label: full-review-please       # shipped default
          # Emergency-bypass label — dogfoods docs/TRIGGER_MODES.md
          # § "Emergency-bypass label". Enabled here so the short-circuit
          # path runs in production (zero LLM tokens on any PR that carries
          # `skip-ai-review`). Manual smoke test:
          #   1. On any PR with `ready` applied and a prior self-review run,
          #      add the `skip-ai-review` label.
          #   2. Remove and re-add `ready` to re-trigger the workflow.
          #   3. Expected: the reviewer posts a `⏭️ skipped` tracking comment
          #      naming `skip-ai-review`, does NOT stamp `self-reviewed:*`,
          #      does NOT touch the IAR marker state, and the leg reports
          #      success (green) so the `Self-review gate` also passes.
          # Human review remains a separate concern — the AI-review skip is
          # orthogonal to whatever approval / branch-protection rules the
          # repo enforces. Consumers who make the AI review part of their
          # merge gate should restrict who can apply `skip-ai-review` via a
          # GitHub ruleset (see docs/TRIGGER_MODES.md for the worked pattern).
          skip-review-label: skip-ai-review

  # ---------------------------------------------------------------------------
  # Stable-named MERGE GATE — the one check with a stable name across events
  # (unlike the dynamic `Self-review — <provider>` legs). Mark THIS job
  # (`Self-review gate`) as the required status check in branch protection when
  # you want "if `ready` is applied, a review must pass before merge".
  #
  # Runs ONLY when the `ready` label is on the PR (opt-in flow). When `ready`
  # isn't applied the whole gate is skipped cleanly — GitHub shows a grey
  # "Skipped" instead of a red X, so a docs/other PR that doesn't want a review
  # doesn't carry noise in the checks list. Trade-off: GitHub treats a *skipped*
  # required check as *passing* for branch protection, so under this opt-in
  # design a PR without `ready` becomes mergeable without a self-review. If you
  # want to force `ready` on every PR (i.e. every PR must be reviewed), combine
  # this required check with a separate rule that enforces the `ready` label
  # (e.g. a lightweight action or a ruleset) — the gate itself is deliberately
  # scoped to "review was requested".
  #
  # When `ready` IS applied and the gate runs, it FAILS (red → blocks merge)
  # unless AT LEAST ONE provider leg ran and passed. This catches two real
  # failure modes: (a) `ready` applied but no provider eligible (config bug —
  # e.g. no `ANTHROPIC_API_KEY` and the diff isn't critical); (b) every eligible
  # leg failed.
  #
  # Pass condition: ≥1 leg passed — NOT "all legs passed". A single flaky or
  # failing provider must not block a merge when another provider reviewed
  # cleanly. The aggregate `needs.self-review.result` can't express this (it's
  # `failure` if ANY leg fails), so we count successful legs from this run's
  # jobs via the API. See docs/TRIGGER_MODES.md § "Recipe: run once when
  # labelled `ready`, block merge until it passes".
  gate:
    name: 'Self-review gate'
    needs: [scope, self-review]
    # Run the gate ONLY when this specific event was a review-request event,
    # authoritatively decided by the scope job's should_run logic and exposed
    # via `empty_reason`. `no-ready-label` means "this run wasn't gated on a
    # ready-labeling — either the label isn't on the PR at all, or an
    # unrelated label (e.g. `bug`) fired the workflow while `ready` happens to
    # be present". In either case we skip the gate (grey) rather than fail on
    # an empty matrix that was expected. When the run IS a review-request the
    # gate runs and enforces pass/fail. `always()` ensures the gate still
    # reports even when the upstream `self-review` job fails or skips.
    #
    # Why not `contains(github.event.pull_request.labels.*.name, 'ready')`?
    # That's a PR-state check — true whenever the label is on the PR, even
    # when the event that fired this run was unrelated (e.g. adding `bug` to
    # a PR that already has `ready`). Then the gate would treat the expected
    # empty matrix as a config bug and fail red incorrectly.
    if: always() && needs.scope.outputs.empty_reason != 'no-ready-label'
    runs-on: ubuntu-latest
    # Override the workflow-wide grant: the gate only needs to read this run's
    # job conclusions; it touches neither the repo contents nor the PR.
    permissions:
      actions: read
    steps:
      - name: Require at least one self-review leg to have passed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SCOPE_RESULT: ${{ needs.scope.result }}
          MATRIX: ${{ needs.scope.outputs.matrix }}
          EMPTY_REASON: ${{ needs.scope.outputs.empty_reason }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          # The scope job itself must have succeeded — a crash there means we
          # can't trust the matrix, so block rather than wave the PR through.
          if [ "$SCOPE_RESULT" != "success" ]; then
            echo "::error::Self-review scope job did not succeed (result=$SCOPE_RESULT). Blocking merge."
            exit 1
          fi
          # Empty matrix == this run WAS a review-request event (the gate's
          # `if:` already filtered out `no-ready-label` runs) but no provider
          # secret is configured on the repo. That's a real config bug worth
          # surfacing — a review was requested but nothing can run it.
          if [ "${MATRIX:-[]}" = "[]" ]; then
            echo "::error::Self-review did not run — a review was requested (via 'ready' label) but no provider secret is configured on this repo. Set at least one of ANTHROPIC_API_KEY, CLAUDE_CODE_OAUTH_TOKEN, CURSOR_API_KEY, or OPENAI_API_KEY as a repo secret to unblock the merge gate."
            exit 1
          fi
          # Count the `Self-review — <provider>` legs of THIS run that concluded
          # success. Match by "starts with Self-review" and exclude this gate job
          # by name (robust to the em-dash in the leg names). `>= 1` → gate green.
          passed=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" --paginate \
            --jq '[.jobs[]
                   | select(.name != "Self-review gate")
                   | select(.name | startswith("Self-review"))
                   | select(.conclusion == "success")] | length')
          echo "Self-review legs that passed: ${passed:-0}"
          if [ "${passed:-0}" -ge 1 ]; then
            echo "At least one self-review leg passed — merge gate satisfied."
          else
            echo "::error::No self-review leg passed — at least one provider must run and pass before merge. Fix findings / rerun (toggle the 'ready' label)."
            exit 1
          fi

# Cursor Agent CLI provider (agent-runner family, v1.1.0+).
#
# The action installs `cursor-agent` (local runtime) and runs it in headless
# mode. Cursor's coding-agent baseline system prompt + its own set of tools
# (LSP-backed navigation, semantic search, MCP) drive the review; the
# reviewer.py runtime unifies the output via .aiprr/findings.json.
#
# Auth & billing (IMPORTANT): the Cursor CLI does NOT support BYOK. Your
# CURSOR_API_KEY must belong to a Cursor Pro / Pro+ / Ultra subscription,
# and every review consumes credits from that subscription. There is no
# way to route through OpenAI/Anthropic keys.
#
# Recommended default: `model: auto`. On the Pro plan, `auto` is UNLIMITED
# (subject to fair-use rate limits), which is the right choice for CI to
# avoid draining monthly credits on premium models. See docs/PROVIDERS.md
# for the full billing story.
#
# Headless-CI flags: v1.2.0+ passes `--force --trust` by default (plus
# `--approve-mcps` when mcp-config-file is set). These are Cursor's own
# recommendations for headless CI usage — you do NOT need to add them
# manually via agent-extra-args.

name: PR review (Cursor Agent)
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Security: the agent-runner CLIs run with broad local access and hold a
    # vendor API key in their env. Restrict this job to trusted (non-fork)
    # PRs so a malicious fork can't influence what the CLI reads/exfiltrates.
    # See docs/SECURITY.md § "Agent-runner providers: residual exfiltration
    # surface". Drop this `if:` only if you accept that risk.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Don't leave the GITHUB_TOKEN in .git/config on disk where the
          # headless CLI could read it. The reviewer talks to the GitHub API
          # in-process, so the CLI never needs git credentials.
          persist-credentials: false

      - uses: DailybotHQ/ai-diff-reviewer@v2
        with:
          provider: cursor
          api-key: ${{ secrets.CURSOR_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Unlimited routing on Pro plans; cheapest correct choice for CI.
          model: auto
          # Optional: pin a specific Cursor Composer model instead of `auto`.
          # model: composer-2.5
          # Optional: pin the CLI version.
          # cursor-version: '2025.11.01'

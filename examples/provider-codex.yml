# OpenAI Codex CLI provider (agent-runner family, v1.1.0+).
#
# The action installs `@openai/codex` via npm and runs Codex in headless mode
# (`codex exec`). OpenAI's coding-agent baseline system prompt drives the
# review; the reviewer.py runtime normalises the output via the shared
# .aiprr/findings.json contract.
#
# Auth: your OpenAI API key. The action forwards it as OPENAI_API_KEY to
# the CLI subprocess.

name: PR review (OpenAI Codex)
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Security: the agent-runner CLIs run with broad local access and hold a
    # vendor API key in their env. Restrict this job to trusted (non-fork)
    # PRs so a malicious fork can't influence what the CLI reads/exfiltrates.
    # See docs/SECURITY.md § "Agent-runner providers: residual exfiltration
    # surface". Drop this `if:` only if you accept that risk.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Don't leave the GITHUB_TOKEN in .git/config on disk where the
          # headless CLI could read it. The reviewer talks to the GitHub API
          # in-process, so the CLI never needs git credentials.
          persist-credentials: false

      - uses: DailybotHQ/ai-diff-reviewer@v2
        with:
          provider: codex
          api-key: ${{ secrets.OPENAI_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Optional: override the default model. The default is
          # `gpt-5.6-luna` (≈$1/$6 per 1M tokens) — the current-gen budget
          # model, strong enough to find subtle bugs while far cheaper than
          # codex-tier models (`gpt-5-codex` is deprecated). Pin the cheaper
          # `gpt-5.4-mini` (≈$0.75/$4.50) for a shallower smoke review, or a
          # codex-tier model for the deepest passes.
          # model: 'gpt-5.4-mini'
          # Optional: pin the CLI version.
          # codex-version: '0.6.1'

# Run the reviewer on every push to any open PR (the classic
# "continuous review" pattern). Explicit `trigger-mode: always` for
# clarity — v1.1 workflows without this input behave the same way when
# `label-gate` is empty.

name: PR review (always)
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: DailybotHQ/ai-diff-reviewer@v2
        with:
          provider: anthropic
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          trigger-mode: always
          strictness: block-on-critical
